services:
  redis:
    image: redis:7-alpine
    container_name: redis

  postgres-shard-0:
    image: postgres:16
    container_name: postgres-shard-0
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    volumes:
      - pg_shard_0_data:/var/lib/postgresql/data

  postgres-shard-1:
    image: postgres:16
    container_name: postgres-shard-1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    volumes:
      - pg_shard_1_data:/var/lib/postgresql/data

  postgres-shard-2:
    image: postgres:16
    container_name: postgres-shard-2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    volumes:
      - pg_shard_2_data:/var/lib/postgresql/data

  creation-a:
    image: creation-service:latest
    build:
      context: ./services/creation-service
      dockerfile: Dockerfile
    container_name: creation-a
    environment:
      MACHINE_ID: a
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SHARD_0_DSN: postgresql://postgres:pass@postgres-shard-0:5432/postgres
      SHARD_1_DSN: postgresql://postgres:pass@postgres-shard-1:5432/postgres
      SHARD_2_DSN: postgresql://postgres:pass@postgres-shard-2:5432/postgres
    depends_on:
      - redis
      - postgres-shard-0
      - postgres-shard-1
      - postgres-shard-2

  creation-b:
    image: creation-service:latest
    container_name: creation-b
    environment:
      MACHINE_ID: b
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SHARD_0_DSN: postgresql://postgres:pass@postgres-shard-0:5432/postgres
      SHARD_1_DSN: postgresql://postgres:pass@postgres-shard-1:5432/postgres
      SHARD_2_DSN: postgresql://postgres:pass@postgres-shard-2:5432/postgres
    depends_on:
      - redis
      - postgres-shard-0
      - postgres-shard-1
      - postgres-shard-2

  creation-c:
    image: creation-service:latest
    container_name: creation-c
    environment:
      MACHINE_ID: c
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SHARD_0_DSN: postgresql://postgres:pass@postgres-shard-0:5432/postgres
      SHARD_1_DSN: postgresql://postgres:pass@postgres-shard-1:5432/postgres
      SHARD_2_DSN: postgresql://postgres:pass@postgres-shard-2:5432/postgres
    depends_on:
      - redis
      - postgres-shard-0
      - postgres-shard-1
      - postgres-shard-2

  redirect:
    build:
      context: ./services/redirect-service
      dockerfile: Dockerfile
    container_name: redirect
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SHARD_0_DSN: postgresql://postgres:pass@postgres-shard-0:5432/postgres
      SHARD_1_DSN: postgresql://postgres:pass@postgres-shard-1:5432/postgres
      SHARD_2_DSN: postgresql://postgres:pass@postgres-shard-2:5432/postgres
    depends_on:
      - redis
      - postgres-shard-0
      - postgres-shard-1
      - postgres-shard-2

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - creation-a
      - creation-b
      - creation-c
      - redirect
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"

volumes:
  pg_shard_0_data:
  pg_shard_1_data:
  pg_shard_2_data:
